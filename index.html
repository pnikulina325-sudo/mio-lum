<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Световое существо v3</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ===== ПОЛОЖЕНИЕ =====
let x = canvas.width/2;
let y = canvas.height/2;
let vx = 0;
let vy = 0;
let targetX = null;
let targetY = null;
let wanderTargetX = null;
let wanderTargetY = null;
let lastMouseMove = Date.now(); 
let hueCycle = 0;
let pulse = 0;
let movementHue = 0; // Плавный переход цвета при движении

// ===== ПАМЯТЬ =====
let saved = JSON.parse(localStorage.getItem("creatureState")) || {};
let now = Date.now();

let lastVisit = saved.lastVisit || now;
let prevHeat = saved.heat !== undefined ? saved.heat : 50;

let hoursAway = (now - lastVisit) / 1000 / 60 / 60;

// остывание во времени
let heat = prevHeat - hoursAway * 8;
heat = Math.max(0, Math.min(100, heat));

// если тебя не было больше 0.2 часа (~12 минут)
if(hoursAway > 0.2){
  // случайное новое положение
  x = Math.random() * canvas.width;
  y = Math.random() * canvas.height;

  // лёгкая смена характера через тепло
  heat += hoursAway * 5;
  heat = Math.max(0, Math.min(100, heat));
}

localStorage.setItem("creatureState", JSON.stringify({
  lastVisit: now,
  heat: heat
}));

// ===== ЧАСТИЦЫ =====
class Spark {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*4;
    this.vy=(Math.random()-0.5)*4;
    this.life=60;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.life--;
  }
  draw(){
    ctx.globalAlpha = this.life/60;
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let sparks=[];

function interact(px,py){
  targetX=px;
  targetY=py;
  lastMouseMove = Date.now(); // Обновляем время последнего движения
  heat+=10;
  heat=Math.min(100,heat);
  for(let i=0;i<4;i++){
    sparks.push(new Spark(x,y));
  }
}

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  for(let t of e.touches){
    interact(t.clientX,t.clientY);
  }
},{passive:false});

canvas.addEventListener("mousemove",e=>{
  interact(e.clientX,e.clientY){
  targetX = clientX;
  targetY = clientY;
  heat += 15;

lastMouseMove = Date.now();

if(Math.random() < 0.1){
    favoriteSpots.push({x: clientX, y: clientY});
    if(favoriteSpots.length > 30) favoriteSpots.shift();
  }
};
});

// ===== ФУНКЦИЯ: Расстояние до края =====
function getDistanceToEdge(x, y, width, height){
  // Находим расстояние до ближайшего края
  let distLeft = x;
  let distRight = width - x;
  let distTop = y;
  let distBottom = height - y;
  
  return Math.min(distLeft, distRight, distTop, distBottom);
}

// ===== АНИМАЦИЯ =====
function animate(){
  hueCycle += 0.5;
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  heat-=0.02;
  heat=Math.max(0,heat);
  localStorage.setItem("creatureState", JSON.stringify({
    lastVisit: now,
    heat: heat
  }));
  
  let nowTime = Date.now();
  let mouseIdle = nowTime - lastMouseMove > 3000; // 3 секунды вместо 2
  
  // === РАССТОЯНИЕ ДО КРАЯ ===
  let distToEdge = getDistanceToEdge(x, y, canvas.width, canvas.height);
  let maxDist = Math.min(canvas.width, canvas.height) / 3; // "Зона комфорта" — треть экрана от центра
  let edgeFactor = Math.max(0, 1 - distToEdge / maxDist); // 0 (в центре) до 1 (на краю)
  
  // === ЛОГИКА ДВИЖЕНИЯ ===
  if(mouseIdle && heat > 20){ // Блуждание срабатывает даже при heat > 20
    // РЕЖИМ: Исследование
  if(wanderTargetX === null){

  if(favoriteSpots.length > 0 && Math.random() < 0.5){
    let spot = favoriteSpots[Math.floor(Math.random() * favoriteSpots.length)];
    wanderTargetX = spot.x;
    wanderTargetY = spot.y;
  } else {
    wanderTargetX = Math.random() * canvas.width;
    wanderTargetY = Math.random() * canvas.height;
  }

}

    let dx = wanderTargetX - x;
    let dy = wanderTargetY - y;

    // Ускорение зависит от близости к краю (ближе к краю — быстрее)
    let acceleration = 0.001 + edgeFactor * 0.0005; // +50% при краю
    vx += dx * acceleration;
    vy += dy * acceleration;

    // Если достигли цели — выбираем новую
    if(Math.abs(dx) < 20 && Math.abs(dy) < 20){
      wanderTargetX = null;
      wanderTargetY = null;
    }

    vx *= 0.97;
    vy *= 0.97;
    x += vx;
    y += vy;
    
  } else {
    // РЕЖИМ: Старая логика (с курсором или случайное)
    if(heat < 20){
      x += (canvas.width/2 - x)*0.05;
      y += (canvas.height/2 - y)*0.05;
      vx=0; vy=0;
    }
    else if(heat < 60){
      vx += (Math.random()-0.5)*0.2;
      vy += (Math.random()-0.5)*0.2;
      vx*=0.98; vy*=0.98;
      x+=vx; y+=vy;
    }
    else{
      if(targetX!==null){
        let dx=targetX-x;
        let dy=targetY-y;
        vx+=dx*0.002;
        vy+=dy*0.002;
      }
      vx*=0.97; vy*=0.97;
      x+=vx; y+=vy;
    }
  }

  // Границы
  if(x<0||x>canvas.width) vx*=-1;
  if(y<0||y>canvas.height) vy*=-1;

  // === ЛОГИКА ЦВЕТА ===
  pulse += 0.03;  // медленно, чтобы "дышал"

  let speed = Math.sqrt(vx*vx + vy*vy);
  let hue;

  if(speed > 1.5){
    // Движение: плавный переход по радуге (вместо случайного мигания)
    movementHue += speed * 0.5; // Скорость переходит в скорость смены цвета
    hue = movementHue % 360;
  } else {
    // Покой: медленно ползём по радуге с плавным переходом
    // В центре: тёплые цвета (жёлтый-красный 0-60)
    // На краю: холодные цвета (синий-фиолетовый 200-280)
    let centerHue = 50 + (Math.sin(pulse) + 1) * 100; // 50-250 (всё радуга)
    let edgeHue = 240; // Холодный синий на краю
    
    // Интерполируем между тёплым (центр) и холодным (край)
    hue = centerHue * (1 - edgeFactor) + edgeHue * edgeFactor;
  }

  let brightness = 40 + heat*0.3;
  ctx.fillStyle = `hsl(${hue}, 100%, ${brightness}%)`;

  // Отрисовка тела
  let baseRadius = 30 + Math.sin(pulse)*(heat*0.15);
  let stretch = Math.min(20, speed * 1.5);
  let radiusX = baseRadius + stretch;
  let radiusY = baseRadius - stretch*0.6;

  ctx.beginPath();
  ctx.ellipse(x, y, radiusX, radiusY, Math.atan2(vy, vx), 0, Math.PI*2);
  ctx.fill();

  // Частицы
  sparks=sparks.filter(s=>s.life>0);
  for(let s of sparks){
    s.update();
    s.draw();
  }

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
